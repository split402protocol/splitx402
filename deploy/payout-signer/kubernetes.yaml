apiVersion: v1
kind: ConfigMap
metadata:
  name: split402-payout-signer-config
  labels:
    app.kubernetes.io/name: split402-payout-signer
    app.kubernetes.io/part-of: split402
data:
  SPLIT402_PAYOUT_SIGNER_SERVICE_PORT: "4022"
  SPLIT402_PAYOUT_SIGNER_SERVICE_REF: "kms:split402-devnet-payout"
  SPLIT402_PAYOUT_SIGNER_SERVICE_NETWORK: "solana:devnet"
  SPLIT402_PAYOUT_SIGNER_SERVICE_EXPECTED_FUNDING_WALLET: "replace-with-funding-wallet"
  SPLIT402_PAYOUT_SIGNER_SERVICE_SIGNATURE_TOLERANCE_SECONDS: "300"
  SPLIT402_PAYOUT_SIGNER_SERVICE_AUDIT_LOG: "stdout-jsonl"
---
apiVersion: v1
kind: Secret
metadata:
  name: split402-payout-signer-secrets
  labels:
    app.kubernetes.io/name: split402-payout-signer
    app.kubernetes.io/part-of: split402
type: Opaque
stringData:
  SPLIT402_PAYOUT_SIGNER_SERVICE_AUTH_KEYS_JSON: >-
    [{"keyId":"control-plane-current","sharedSecret":"replace-with-shared-secret","status":"active"}]
  SPLIT402_PAYOUT_SIGNER_SERVICE_PRIVATE_KEY_BASE64: "replace-with-32-byte-private-key-base64"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: split402-payout-signer
  labels:
    app.kubernetes.io/name: split402-payout-signer
    app.kubernetes.io/part-of: split402
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: split402-payout-signer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: split402-payout-signer
        app.kubernetes.io/part-of: split402
    spec:
      automountServiceAccountToken: false
      containers:
        - name: payout-signer
          image: "ghcr.io/split402protocol/splitx402/payout-signer@sha256:<replace-with-image-digest>"
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 4022
          envFrom:
            - configMapRef:
                name: split402-payout-signer-config
            - secretRef:
                name: split402-payout-signer-secrets
          readinessProbe:
            httpGet:
              path: /v1/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /v1/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop:
                - ALL
---
apiVersion: v1
kind: Service
metadata:
  name: split402-payout-signer
  labels:
    app.kubernetes.io/name: split402-payout-signer
    app.kubernetes.io/part-of: split402
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: split402-payout-signer
  ports:
    - name: http
      port: 4022
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: split402-payout-signer-private-ingress
  labels:
    app.kubernetes.io/name: split402-payout-signer
    app.kubernetes.io/part-of: split402
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: split402-payout-signer
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: split402-control-plane
      ports:
        - protocol: TCP
          port: 4022
