name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Install
        run: corepack pnpm install --frozen-lockfile

      - name: Lint
        run: corepack pnpm lint

      - name: Public surface check
        run: corepack pnpm product:public-surface-check --brief

      - name: Typecheck
        run: corepack pnpm typecheck

      - name: Test
        run: corepack pnpm test

      - name: Build
        run: corepack pnpm build

      - name: Check vectors
        run: corepack pnpm vectors:check

      - name: Audit
        run: corepack pnpm audit --audit-level high

  postgres-integration:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: split402
          POSTGRES_PASSWORD: split402
          POSTGRES_DB: split402_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U split402 -d split402_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SPLIT402_TEST_DATABASE_URL: postgresql://split402:split402@localhost:5432/split402_test

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Install
        run: corepack pnpm install --frozen-lockfile

      - name: Build workspace
        run: corepack pnpm -r --if-present build

      - name: PostgreSQL integration tests
        run: corepack pnpm test:postgres
