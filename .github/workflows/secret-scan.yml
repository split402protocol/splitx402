name: Secret Scan

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "17 4 * * 1"

permissions:
  contents: read
  pull-requests: read

jobs:
  gitleaks:
    name: Secret scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - name: Scan committed history for secrets
        uses: gitleaks/gitleaks-action@v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
